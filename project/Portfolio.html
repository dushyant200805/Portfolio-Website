function qs(s) { return document.querySelector(s); }
function qsa(s) { return document.querySelectorAll(s); }
function byId(id) { return document.getElementById(id); }

let currentPage = 'home';

/* === LOADER === */
(function() {
  const el = byId('loader'), counter = byId('loaderCounter'), name = byId('loaderName'), sub = byId('loaderSub'), fill = byId('loaderFill');
  const start = Date.now(), duration = 2200;
  function tick() {
    const elapsed = Date.now() - start, progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3), count = Math.round(eased * 100);
    counter.textContent = count;
    fill.style.width = count + '%';
    if (count > 20) { name.style.opacity = '1'; }
    if (count > 50) { sub.style.opacity = '1'; }
    if (progress >= 1) {
      setTimeout(function() {
        el.classList.add('done');
        setTimeout(function() { el.style.display = 'none'; app(); }, 600);
      }, 300);
    } else { requestAnimationFrame(tick); }
  }
  requestAnimationFrame(tick);
})();

function getInitialPage() {
  const hash = window.location.hash.replace('#','');
  return ['home','work','services','about','contact'].includes(hash) ? hash : 'home';
}

function navigate(page) {
  currentPage = page;
  window.location.hash = page;
  qsa('.page').forEach(function(p) { p.classList.remove('active'); });
  var target = byId('page-' + page);
  if (target) {
    target.classList.add('active');
    target.classList.remove('page-enter');
    void target.offsetWidth;
    target.classList.add('page-enter');
    setTimeout(function() { target.classList.add('visible'); }, 30);
  }
  updateNav();
  window.scrollTo({top: 0});
}

function updateNav() {
  qsa('.nav-link').forEach(function(l) { l.classList.toggle('active', l.dataset.nav === currentPage); });
  qsa('.mobile-nav-link').forEach(function(l) { l.classList.toggle('active', l.dataset.nav === currentPage); });
}

function openMobileNav() { byId('mobileNav').classList.add('open'); }
function closeMobileNav() { byId('mobileNav').classList.remove('open'); }

/* === THEME === */
function loadTheme() {
  var t = localStorage.getItem('dp-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  updateThemeIcon(t);
}
function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme');
  var next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('dp-theme', next);
  updateThemeIcon(next);
}
function updateThemeIcon(theme) {
  var html = theme === 'dark'
    ? icon('sun', 16)
    : icon('moon', 16);
  qsa('.theme-toggle').forEach(function(b) { b.innerHTML = html; });
}

/* === SCROLL NAV === */
function initScrollNav() {
  var nav = byId('nav');
  window.addEventListener('scroll', function() {
    nav.classList.toggle('nav-scrolled', window.scrollY > 20);
  }, {passive: true});
}

/* === SCROLL REVEAL === */
function initScrollReveal() {
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, {threshold: 0.1, rootMargin: '0px 0px -40px 0px'});
  qsa('.sr').forEach(function(el) { obs.observe(el); });
}

/* === HERO ANIMATION === */
function initHeroAnimation() {
  setTimeout(function() {
    qsa('.hero-line-inner').forEach(function(el) { el.classList.add('visible'); });
  }, 300);
}

/* === BACK TO TOP === */
function initBackToTop() {
  var btn = byId('backToTop');
  window.addEventListener('scroll', function() {
    btn.classList.toggle('show', window.scrollY > 400);
  }, {passive: true});
}

/* === HASH LISTENER === */
function initHashListener() {
  window.addEventListener('hashchange', function() {
    var hash = window.location.hash.replace('#','');
    if (['home','work','services','about','contact'].includes(hash) && hash !== currentPage) navigate(hash);
  });
}
